# SoulCore Web — deploy on Graviton alongside existing soul-core stack
# Usage: docker compose -f docker-compose.graviton.yml up -d --build

services:
  soulcore-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: soulcore-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      # ANTHROPIC removed 2026-06-08 — NEXUS now uses DeepSeek.
      # RESEND removed 2026-06-08 — migrated to Gmail SMTP (Google Workspace).
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_APP_PASSWORD=${SMTP_APP_PASSWORD:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-founder@soulcore.dev}
      - FROM_EMAIL=${FROM_EMAIL:-founder@soulcore.dev}
      - REPLY_TO_EMAIL=${REPLY_TO_EMAIL:-founder@soulcore.dev}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - NEXUS_LOG_DIR=${NEXUS_LOG_DIR:-/tmp}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      # Use node's net module — wget/curl aren't shipped in the Next.js
      # standalone runner image. exits 0 on any 2xx/3xx response.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  license-server:
    build:
      context: ./apps/license-server
      dockerfile: Dockerfile
    container_name: license-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - LICENSE_SERVICE_SECRET=${LICENSE_SERVICE_SECRET}
      - WHOP_WEBHOOK_SECRET=${WHOP_WEBHOOK_SECRET:-}
      - DOWNLOAD_SECRET=${DOWNLOAD_SECRET:-}
      - DOWNLOAD_BASE_URL=https://soulcore.dev/api/licenses
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-}
    volumes:
      - license-data:/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      # Go alpine image has busybox/nc but NOT bash. The previous test
      # used /dev/tcp redirection which requires bash. nc with -z does a
      # TCP-connect probe and is available in the standard busybox build.
      test: ["CMD", "nc", "-z", "127.0.0.1", "8090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  license-data:
