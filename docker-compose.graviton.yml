# SoulCore Web — deploy on Graviton alongside existing soul-core stack
# Usage: docker compose -f docker-compose.graviton.yml up -d --build

services:
  soulcore-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: soulcore-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-founder@soulcore.dev}
      - FROM_EMAIL=${FROM_EMAIL:-hello@soulcore.dev}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      # Use node's net module — wget/curl aren't shipped in the Next.js
      # standalone runner image. exits 0 on any 2xx/3xx response.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  license-server:
    build:
      context: ./apps/license-server
      dockerfile: Dockerfile
    container_name: license-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - LICENSE_SERVICE_SECRET=${LICENSE_SERVICE_SECRET}
      - WHOP_WEBHOOK_SECRET=${WHOP_WEBHOOK_SECRET:-}
      - DOWNLOAD_SECRET=${DOWNLOAD_SECRET:-}
      - DOWNLOAD_BASE_URL=https://soulcore.dev/api/licenses
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-}
    volumes:
      - license-data:/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      # license-server is a Go binary — `wget` may or may not be in its
      # base image. Use a TCP connect via Go's built-in net package via
      # a one-line shell test instead of relying on wget.
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8090' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  license-data:
